services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eloquent_app_pg
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eloquent_app_pg"]
      interval: 5s
      timeout: 5s
      retries: 20

  memcached:
    image: memcached:1.6-alpine
    command: ["memcached", "-m", "64", "-p", "11211", "-u", "memcache"]
    ports:
      - "11211:11211"
